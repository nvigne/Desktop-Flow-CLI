name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Desktop-Flow-CLI.slnx

      - name: Build
        run: dotnet build Desktop-Flow-CLI.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Desktop-Flow-CLI.slnx --configuration Release --no-build

      - name: Pack
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: dotnet pack DesktopFlowCLI/DesktopFlowCLI.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload package artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
